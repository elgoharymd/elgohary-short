<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مختصر الروابط | elgoharyX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body class="flex items-center justify-center p-6">

    <div id="app" class="glass-card p-8 rounded-3xl shadow-2xl w-full max-w-md text-center border border-white/20">
        
        <div id="main-content">
            <div class="text-5xl mb-4">🔗</div>
            <h1 class="text-2xl font-black text-blue-900 mb-2">elgoharyX Shortener</h1>
            <p class="text-gray-500 text-sm mb-8">اختصر روابطك بلمسة احترافية</p>

            <div class="space-y-4">
                <input type="url" id="longUrl" placeholder="أدخل الرابط الطويل هنا..." 
                       class="w-full p-4 bg-gray-50 border-2 border-transparent rounded-2xl text-right outline-none focus:border-blue-500 focus:bg-white transition-all shadow-sm">
                
                <button id="shortenBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl shadow-lg transform active:scale-95 transition-all text-lg">
                    إنشاء رابط elgoharyX
                </button>
            </div>

            <div id="resultArea" class="hidden mt-8 p-4 bg-green-50 border border-green-200 rounded-2xl">
                <p class="text-green-800 font-bold mb-2 text-sm">تم الاختصار بنجاح! 🎉</p>
                <div class="flex items-center gap-2 bg-white p-3 rounded-xl border border-green-100 shadow-inner">
                    <a id="shortLink" href="#" target="_blank" class="text-blue-600 font-bold break-all text-sm underline flex-1 text-left"></a>
                </div>
                <button onclick="copyToClipboard()" class="mt-3 text-blue-500 text-xs font-bold hover:underline">نسخ الرابط</button>
            </div>
        </div>

        <div id="redirect-screen" class="hidden py-12">
            <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-blue-600 mx-auto"></div>
            <p class="mt-6 text-blue-900 font-bold text-lg italic">جاري تحويلك عبر elgoharyX...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, get, child } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // إعداداتك التي أرسلتها
        const firebaseConfig = {
            apiKey: "AIzaSyDGhCAU7DLleD1KkCR6SQmvl8bpDncHJ8g",
            authDomain: "planning-with-ai-797ec.firebaseapp.com",
            projectId: "planning-with-ai-797ec",
            databaseURL: "https://planning-with-ai-797ec-default-rtdb.firebaseio.com", // تأكد أن هذا الرابط صحيح في الـ Console لديك
            storageBucket: "planning-with-ai-797ec.firebasestorage.app",
            messagingSenderId: "283439580292",
            appId: "1:283439580292:web:b566dc267bdb8861ca2ed1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const shortenBtn = document.getElementById('shortenBtn');
        const longUrlInput = document.getElementById('longUrl');

        shortenBtn.addEventListener('click', async () => {
            const originalUrl = longUrlInput.value.trim();
            if (!originalUrl) return alert("من فضلك ضع رابطاً!");

            const uniqueId = Math.random().toString(36).substring(2, 6);
            const slug = "elgoharyX" + uniqueId;

            try {
                await set(ref(db, 'links/' + slug), { target: originalUrl });
                const finalLink = window.location.origin + window.location.pathname + "?" + slug;
                document.getElementById('shortLink').innerText = finalLink;
                document.getElementById('shortLink').href = finalLink;
                document.getElementById('resultArea').classList.remove('hidden');
            } catch (e) {
                alert("خطأ: تأكد من تفعيل Realtime Database وضبط الـ Rules!");
            }
        });

        window.onload = async () => {
            const query = window.location.search.substring(1);
            if (query && query.startsWith('elgoharyX')) {
                document.getElementById('main-content').classList.add('hidden');
                document.getElementById('redirect-screen').classList.remove('hidden');

                const snapshot = await get(child(ref(db), `links/${query}`));
                if (snapshot.exists()) {
                    window.location.href = snapshot.val().target;
                } else {
                    alert("الرابط غير موجود!");
                    window.location.href = window.location.origin + window.location.pathname;
                }
            }
        };
    </script>

    <script>
        function copyToClipboard() {
            const linkText = document.getElementById('shortLink').innerText;
            navigator.clipboard.writeText(linkText).then(() => alert("تم النسخ!"));
        }
    </script>
</body>
</html>
